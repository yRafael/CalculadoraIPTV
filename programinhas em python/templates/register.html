<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRE PLAY | REGISTRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --fire: #ff4500;
            --dark: #0a0a0a;
            --gray: rgba(26, 26, 26, 0.95); /* Leve transparência para o card */
            --text: #ffffff;
        }

        body, html { height: 100%; margin: 0; overflow: hidden; }

        /* --- O FUNDO BORRADO (IGUAL AO LOGIN) --- */
        .background-image {
            background-image: url('https://i.ibb.co/hFGFWHy3/FIREPLAT.png');
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            filter: blur(15px);
            transform: scale(1.1);
            position: fixed;
            width: 100%;
            z-index: -2;
        }

        .background-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8); /* Um pouco mais escuro para destacar o card */
            z-index: -1;
        }

        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: var(--gray);
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 350px;
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.2);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo-main {
            width: 120px;
            height: auto;
            margin-bottom: 10px;
        }

        h1 { font-family: 'Orbitron'; color: var(--fire); margin-bottom: 25px; font-size: 20px; letter-spacing: 1px; }

        label { display: block; text-align: left; margin-bottom: 8px; font-size: 11px; color: #aaa; text-transform: uppercase; }

        input {
            width: 100%; padding: 14px; margin-bottom: 18px;
            border-radius: 6px; border: 1px solid #444;
            background: #222; color: #fff; box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--fire); outline: none; box-shadow: 0 0 5px rgba(255, 69, 0, 0.3); }

        .btn-fire {
            width: 100%; padding: 14px; border: none; border-radius: 6px;
            background: linear-gradient(45deg, #ff4500, #ff8c00);
            color: white; font-weight: bold; font-family: 'Orbitron';
            cursor: pointer; transition: 0.3s;
        }

        .btn-fire:hover { transform: scale(1.02); filter: brightness(1.1); }

        .footer-link { margin-top: 20px; font-size: 12px; color: #888; }
        .footer-link a { color: var(--fire); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="background-image"></div>
    <div class="background-overlay"></div>

    <div class="login-card">
        <img src="https://i.ibb.co/hFGFWHy3/FIREPLAT.png" alt="FIRE PLAY" class="logo-main">

        <h1>CRIAR CONTA</h1>

        <form method="POST">
            <label><i class="fa-solid fa-user"></i> Novo Usuário</label>
            <input type="text" name="username" placeholder="Escolha um usuário" required>

            <label><i class="fa-solid fa-lock"></i> Senha</label>
            <input type="password" name="password" placeholder="Crie uma senha forte" required>

            <button type="submit" class="btn-fire">CADASTRAR</button>
        </form>

        <div class="footer-link">
            Já tem conta? <a href="/">Voltar ao Login</a>
        </div>
    </div>

</body>
</html>
